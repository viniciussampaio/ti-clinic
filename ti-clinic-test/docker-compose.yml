services:
  db:
    image: mysql:8.0
    container_name: ti-clinic-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-clinic}
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    ports:
      - "${DB_PORT_EXPOSE:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: .
      target: dev
    container_name: ti-clinic-api
    env_file:
      - .env.docker
    environment:
      # In docker, DB_HOST must point to the service name
      DB_HOST: db
      DB_PORT: 3306
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "node scripts/wait-for-tcp.mjs db 3306
      && yarn migration:run
      && yarn start:dev"

volumes:
  db_data:
  node_modules:

